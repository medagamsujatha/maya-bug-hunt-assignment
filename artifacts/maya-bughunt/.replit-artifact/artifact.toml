kind = "web"
previewPath = "/"
title = "Maya Bug Hunt Tracker"
version = "1.0.0"
id = "artifacts/maya-bughunt"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25942

[services.development]
run = "pnpm --filter @workspace/maya-bughunt run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/maya-bughunt", "run", "build" ]
publicDir = "artifacts/maya-bughunt/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25942"
BASE_PATH = "/"
